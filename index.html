<title>ADOS — Platform Vision</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FAF9F7;
  color: #1C1917;
  min-height: 100vh;
}

/* Lock screen */
.lock-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  position: relative;
}

.lock-screen::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.25'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 0;
}

.lock-card {
  position: relative;
  z-index: 1;
  max-width: 400px;
  width: 100%;
}

.lock-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #A8A29E;
  margin-bottom: 16px;
}

.lock-title {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 36px;
  line-height: 1.15;
  color: #1C1917;
  margin-bottom: 6px;
}

.lock-subtitle {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: #78716C;
  margin-bottom: 48px;
  line-height: 1.5;
}

.lock-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #A8A29E;
  margin-bottom: 10px;
}

.lock-input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.lock-input {
  flex: 1;
  padding: 14px 16px;
  border: 1.5px solid #D6D3CD;
  border-radius: 6px;
  background: #FFFFFF;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: #1C1917;
  outline: none;
  transition: border-color 0.2s;
}

.lock-input:focus {
  border-color: #B44D2D;
}

.lock-input::placeholder {
  color: #A8A29E;
}

.lock-btn {
  padding: 14px 28px;
  background: #1C1917;
  color: #FAF9F7;
  border: none;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}

.lock-btn:hover {
  background: #292524;
}

.lock-btn:active {
  transform: scale(0.98);
}

.lock-error {
  font-size: 13px;
  color: #B44D2D;
  height: 20px;
  font-weight: 500;
}

.lock-footer {
  margin-top: 64px;
  padding-top: 20px;
  border-top: 1px solid #E8E6E1;
  font-size: 12px;
  color: #A8A29E;
  line-height: 1.6;
}

.lock-footer strong {
  color: #78716C;
  font-weight: 500;
}

/* Content wrapper (hidden until unlocked) */
#content-frame {
  display: none;
  width: 100%;
  min-height: 100vh;
}

#content-frame iframe {
  width: 100%;
  height: 100vh;
  border: none;
}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="lock-id">Confidential Document</div>
    <div class="lock-title">ADOS</div>
    <div class="lock-subtitle">Platform Vision & Strategy<br>Alignment Draft</div>

    <div class="lock-label">Access code</div>
    <div class="lock-input-group">
      <input type="password" class="lock-input" id="pwInput" placeholder="Enter password" autocomplete="off" autofocus>
      <button class="lock-btn" id="unlockBtn" onclick="unlock()">Open</button>
    </div>
    <div class="lock-error" id="errorMsg"></div>

    <div class="lock-footer">
      <strong>Cone Red Inc. &times; X-ADTECH Limited</strong><br>
      This document is confidential and intended for authorized recipients only.
    </div>
  </div>
</div>

document.getElementById("pwInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function deriveKeyStream(password, salt, length) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]);
  const derived = await crypto.subtle.deriveBits(
    { name: "PBKDF2", salt: enc.encode(salt), iterations: 100000, hash: "SHA-256" },
    keyMaterial, 256
  );
  const key = new Uint8Array(derived);
  let stream = new Uint8Array(0);
  let counter = 0;
  while (stream.length < length) {
    const data = new Uint8Array(key.length + 4);
    data.set(key);
    data[key.length] = (counter >> 24) & 0xFF;
    data[key.length+1] = (counter >> 16) & 0xFF;
    data[key.length+2] = (counter >> 8) & 0xFF;
    data[key.length+3] = counter & 0xFF;
    const hash = new Uint8Array(await crypto.subtle.digest("SHA-256", data));
    const combined = new Uint8Array(stream.length + hash.length);
    combined.set(stream);
    combined.set(hash, stream.length);
    stream = combined;
    counter++;
  }
  return stream.slice(0, length);
}

async function unlock() {
  const pw = document.getElementById("pwInput").value;
  const errEl = document.getElementById("errorMsg");
  const btn = document.getElementById("unlockBtn");

  if (!pw) { errEl.textContent = "Please enter the password."; return; }

  btn.textContent = "...";
  btn.disabled = true;

  try {
    const hash = await sha256(pw);
    if (hash !== PW_HASH) {
      errEl.textContent = "Incorrect password.";
      btn.textContent = "Open";
      btn.disabled = false;
      return;
    }

    // Decrypt
    const encBytes = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const keyStream = await deriveKeyStream(pw, SALT, encBytes.length);
    const decrypted = new Uint8Array(encBytes.length);
    for (let i = 0; i < encBytes.length; i++) {
      decrypted[i] = encBytes[i] ^ keyStream[i];
    }
    const b64Content = new TextDecoder().decode(decrypted);
    const htmlContent = atob(b64Content);

    // Replace page with content
    document.getElementById("lockScreen").style.display = "none";
    document.open();
    document.write(htmlContent);
    document.close();
  } catch (e) {
    errEl.textContent = "Decryption failed. Try again.";
    btn.textContent = "Open";
    btn.disabled = false;
  }
}
