async function sha256(msg) { const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg)); return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join(""); }
async function deriveKeyStream(password, salt, length) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]);
  const derived = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: enc.encode(salt), iterations: 100000, hash: "SHA-256" }, keyMaterial, 256);
  const key = new Uint8Array(derived);
  let stream = new Uint8Array(0);
  let counter = 0;
  while (stream.length < length) {
    const data = new Uint8Array(key.length + 4);
    data.set(key);
    data[key.length] = (counter >> 24) & 0xFF;
    data[key.length+1] = (counter >> 16) & 0xFF;
    data[key.length+2] = (counter >> 8) & 0xFF;
    data[key.length+3] = counter & 0xFF;
    const hash = new Uint8Array(await crypto.subtle.digest("SHA-256", data));
    const combined = new Uint8Array(stream.length + hash.length);
    combined.set(stream);
    combined.set(hash, stream.length);
    stream = combined;
    counter++;
  }
  return stream.slice(0, length);
}
async function unlock() {
  const pw = document.getElementById("pwInput").value;
  const errEl = document.getElementById("errorMsg");
  const btn = document.getElementById("unlockBtn");
  if (!pw) { errEl.textContent = "Please enter the password."; return; }
  btn.textContent = "..."; btn.disabled = true;
  try {
    const hash = await sha256(pw);
    if (hash !== PW_HASH) { errEl.textContent = "Incorrect password."; btn.textContent = "Open"; btn.disabled = false; return; }
    const encBytes = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const keyStream = await deriveKeyStream(pw, SALT, encBytes.length);
    const decrypted = new Uint8Array(encBytes.length);
    for (let i = 0; i < encBytes.length; i++) { decrypted[i] = encBytes[i] ^ keyStream[i]; }
    const b64Content = new TextDecoder().decode(decrypted);
    const htmlContent = atob(b64Content);
    document.getElementById("lockScreen").style.display = "none";
    document.open();
    document.write(htmlContent);
    document.close();
  } catch (e) { errEl.textContent = "Decryption failed. Try again."; btn.textContent = "Open"; btn.disabled = false; }
}
